# fly.toml - Backend (Flask API)
# Desplegar con: flyctl deploy -c fly-backend.toml

app = "taller-docker-backend"
primary_region = "scl"  # Santiago, Chile
build.builder = "docker"

[build]
  dockerfile = "backend/Dockerfile"
  context = "."

[env]
  FLASK_ENV = "production"
  PYTHONUNBUFFERED = "1"

# Variables de conexión a PostgreSQL
# Serán inyectadas por Fly.io automáticamente
[build.args]
  DB_USER = "talleruser"
  DB_NAME = "tallerdb"

# Health Check
[[services]]
  protocol = "tcp"
  internal_port = 5000

  [[services.ports]]
    port = 80
    handlers = ["http"]
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[checks]
  [checks.http_health]
    grace_period = "5s"
    interval = "10s"
    method = "GET"
    path = "/"
    protocol = "http"
    timeout = "5s"
    type = "http"

[deploy]
  release_command = "echo 'Iniciando backend...'"
  strategy = "rolling"
