# =============================================================
# Taller Sumativo – Despliegue de entorno con Docker
# Asignatura: Aplicaciones y Tecnologías de la Web
# Universidad San Sebastián
#
# Arquitectura de 3 capas (cliente-servidor en contenedores):
#   - frontend : HTML estático servido por Nginx  → localhost:8080
#   - backend  : API REST con Python/Flask         → localhost:3000
#   - db       : PostgreSQL con volumen persistente
# =============================================================

version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: taller-frontend
    ports:
      - "8080:80"
    networks:
      - taller-network
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: taller-backend
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/taller_db
    ports:
      - "3000:5000"
    networks:
      - taller-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: taller-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=taller_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taller-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  taller-network:
    driver: bridge
