<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taller Docker – USS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1b2a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1a2b3c;
      border: 1px solid #2e4a6a;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 680px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    h1 { color: #c9a84c; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .subtitle { color: #7ab3d4; font-size: 1rem; margin-bottom: 2rem; }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 2rem 0;
    }
    .service {
      background: #0d1b2a;
      border-radius: 8px;
      padding: 1rem;
      border: 1px solid #2e4a6a;
    }
    .service h3 { font-size: 0.85rem; color: #7ab3d4; margin-bottom: 0.5rem; text-transform: uppercase; }
    .service p { font-size: 0.9rem; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .dot.green { background: #4caf50; }
    .dot.yellow { background: #ffc107; }
    .api-section { margin-top: 1.5rem; }
    button {
      background: #c9a84c;
      color: #0d1b2a;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      margin-top: 1rem;
    }
    button:hover { background: #dfc06a; }
    #api-response {
      margin-top: 1rem;
      background: #0d1b2a;
      border-radius: 6px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.85rem;
      color: #4caf50;
      text-align: left;
      min-height: 48px;
    }
    footer { margin-top: 2rem; font-size: 0.8rem; color: #556; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Taller Sumativo – Docker</h1>
    <p class="subtitle">Aplicaciones y Tecnologías de la Web · Universidad San Sebastián</p>

    <div class="status-grid">
      <div class="service">
        <h3>Frontend</h3>
        <p><span class="dot green"></span>Nginx · :8080</p>
      </div>
      <div class="service">
        <h3>Backend</h3>
        <p><span class="dot yellow" id="backend-dot"></span>Flask · :3000</p>
      </div>
      <div class="service">
        <h3>Base de Datos</h3>
        <p><span class="dot green"></span>PostgreSQL · :5432</p>
      </div>
    </div>

    <div class="api-section">
      <p>Prueba la conexión con el backend:</p>
      <button onclick="consultarAPI()">Consultar API</button>
      <div id="api-response">→ Presiona el botón para llamar al backend</div>
    </div>
  </div>

  <footer>Jorge Cortés A. · 21/03/2026</footer>

  <script>
    // Llama al endpoint /api/status del backend (proxy por Nginx)
    async function consultarAPI() {
      const div = document.getElementById('api-response');
      div.textContent = '→ Consultando...';
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        div.textContent = JSON.stringify(data, null, 2);
        document.getElementById('backend-dot').className = 'dot green';
      } catch (e) {
        div.textContent = '✗ Error: no se pudo conectar con el backend. ¿Está corriendo?';
        div.style.color = '#f44336';
      }
    }
  </script>
</body>
</html>
