# =============================================================
# Configuración de Nginx – Servicio Frontend
# Puerto de escucha: 80 (dentro del contenedor)
# =============================================================

server {
    listen 80;
    server_name localhost;

    # Directorio raíz donde se encuentran los archivos estáticos
    root /usr/share/nginx/html;
    index index.html;

    # ── Archivos estáticos del frontend ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy inverso hacia el backend ────────────────────
    # Las peticiones a /api/* se redirigen al servicio "backend"
    # usando el nombre de servicio de Docker (resolución DNS interna).
    location /api/ {
        proxy_pass         http://backend:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Cabeceras de seguridad básicas ────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
